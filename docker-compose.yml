version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finerelief-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    networks:
      - finerelief-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finerelief-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - finerelief-network
    environment:
      - VITE_API_URL=http://backend:8000

networks:
  finerelief-network:
    driver: bridge

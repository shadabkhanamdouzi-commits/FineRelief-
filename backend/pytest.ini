[pytest]
# Pytest configuration for FineRelief backend tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for organizing tests
markers =
    unit: Unit tests (not using external services)
    integration: Integration tests (may use external services)
    api: API endpoint tests
    slow: Tests that take >1 second
    ci: Tests that run in CI/CD pipeline

# Coverage options
[coverage:run]
branch = True
source = app

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[coverage:html]
directory = htmlcov
